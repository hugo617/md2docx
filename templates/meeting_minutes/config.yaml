name: "Meeting Minutes Template"
description: "地铁物业会议纪要模板"
mode: "table_fill"

# Content mapping from Markdown headings to field names
content_mapping:
  headings:
    "与会人员": "attendees"
    "会议摘要": "summary_content"
    "待明确事项": "pending_content"
    "下一步工作安排": "next_steps_content"

# Field mappings for table filling
fields:
  # Row 0: Basic info
  - name: "meeting_time"
    table_index: 0
    row: 0
    col: 1
    label: "会议时间"
    required: true

  - name: "meeting_location"
    table_index: 0
    row: 0
    col: 3
    label: "会议地点"
    required: true

  - name: "recorder"
    table_index: 0
    row: 0
    col: 5
    label: "会议记录人"
    required: true

  # Row 1: Attendees (spans 5 columns)
  - name: "attendees"
    table_index: 0
    row: 1
    col: 1
    label: "与会人员"
    required: true

  # Row 2: Meeting purpose (spans 5 columns)
  - name: "meeting_purpose"
    table_index: 0
    row: 2
    col: 1
    label: "会议主旨"
    required: true

  # Row 3: Meeting agenda header (spans 6 columns)
  - name: "agenda_header"
    table_index: 0
    row: 3
    col: 0
    label: "会议议程"

  # Row 4: Agenda content (spans 6 columns)
  - name: "agenda_content"
    table_index: 0
    row: 4
    col: 0
    label: "议程内容"

  # Row 5: Summary header (spans 6 columns)
  - name: "summary_header"
    table_index: 0
    row: 5
    col: 0
    label: "会议摘要"

  # Row 6: Summary content (spans 6 columns)
  - name: "summary_content"
    table_index: 0
    row: 6
    col: 0
    label: "摘要内容"

  # Row 7: Pending items header (spans 6 columns)
  - name: "pending_header"
    table_index: 0
    row: 7
    col: 0
    label: "待明确事项"

  # Row 8: Pending items content (spans 6 columns)
  - name: "pending_content"
    table_index: 0
    row: 8
    col: 0
    label: "待明确事项内容"

  # Row 9: Next steps header (spans 6 columns)
  - name: "next_steps_header"
    table_index: 0
    row: 9
    col: 0
    label: "下一步工作安排"

  # Row 10: Next steps content (spans 6 columns)
  - name: "next_steps_content"
    table_index: 0
    row: 10
    col: 0
    label: "下一步工作安排内容"
